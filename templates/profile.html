<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Настройки профиля | Webgram</title>
    <style>
        :root {
            --bg-body: #e6ebeb; --bg-panel: #ffffff; --primary: #3390ec; 
            --text-main: #000000; --text-muted: #707579; --border: #dfe1e5;
        }
        [data-theme="dark"] {
            --bg-body: #0f0f0f; --bg-panel: #212121; --primary: #8774e1; 
            --text-main: #ffffff; --text-muted: #aaaaaa; --border: #303030;
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .profile-card { background: var(--bg-panel); width: 100%; max-width: 400px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        
        .avatar-preview { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; background: linear-gradient(135deg, #3390ec, #00c6ff); display: flex; align-items: center; justify-content: center; font-size: 50px; color: white; margin: 0 auto 20px; border: 3px solid var(--border); }
        
        h2 { margin-bottom: 5px; }
        .username { color: var(--text-muted); margin-bottom: 20px; font-size: 15px; }

        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 5px; }
        input[type="text"], select, input[type="file"] { width: 100%; box-sizing: border-box; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-body); color: var(--text-main); outline: none; }
        input[type="file"] { padding: 8px; cursor: pointer; }

        .btn-save { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn-back { display: block; margin-top: 15px; color: var(--primary); text-decoration: none; font-size: 14px; }
        .btn-logout { display: block; margin-top: 20px; color: #e53935; text-decoration: none; font-size: 14px; font-weight: 600; border-top: 1px solid var(--border); padding-top: 15px; }
    </style>
</head>
<body data-theme="{{ me.theme }}">

    <div class="profile-card">
        {% if '/' in me.avatar %}
            <img src="{{ me.avatar }}" class="avatar-preview" alt="Avatar">
        {% else %}
            <div class="avatar-preview">{{ me.avatar }}</div>
        {% endif %}

        <h2>{{ me.username }}</h2>
        <div class="username">@{{ me.username }}</div>

        <form action="/profile" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Загрузить новое фото профиля</label>
                <input type="file" name="avatar_file" accept="image/*">
            </div>

            <div class="form-group">
                <label>О себе</label>
                <input type="text" name="bio" value="{{ me.bio }}" placeholder="Расскажите немного о себе...">
            </div>

            <div class="form-group">
                <label>Тема оформления</label>
                <select name="theme">
                    <option value="light" {% if me.theme == 'light' %}selected{% endif %}>Светлая</option>
                    <option value="dark" {% if me.theme == 'dark' %}selected{% endif %}>Темная</option>
                </select>
            </div>

            <button type="submit" class="btn-save">Сохранить изменения</button>
        </form>

        <a href="/" class="btn-back">← Назад в чаты</a>
        <a href="/logout" class="btn-logout">Выйти из аккаунта</a>
    </div>

</body>
</html>
