<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация в Messenger</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #9db2bf; /* Тот же цвет, что и для входа */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            text-align: center; 
            width: 100%;
            max-width: 320px; 
        }
        h2 { 
            color: #333; 
            margin-bottom: 20px; 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box; 
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            border-color: #3390ec;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #3390ec; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            background: #2b78c5;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-bottom: 10px;
        }
        a { 
            color: #3390ec; 
            text-decoration: none; 
            font-size: 14px; 
        }
        p {
            margin-top: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Регистрация</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="error-msg">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form method="POST" action="/register">
            <input type="text" name="username" placeholder="Придумайте логин" required>
            <input type="password" name="password" placeholder="Придумайте пароль" required>
            <button type="submit">Создать аккаунт</button>
        </form>

        <p>Уже есть аккаунт? <br>
            <a href="/">Вернуться ко входу</a>
        </p>
    </div>
</body>
</html>
