<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Super Messenger</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root { --bg: #f4f4f9; --panel: white; --text: #333; --accent: #0084ff; }
        [data-theme="dark"] { --bg: #1a1a1a; --panel: #2d2d2d; --text: #eee; --accent: #3a86ff; }
        
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 250px; background: var(--panel); border-right: 1px solid #444; display: flex; flex-direction: column; }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        
        .user-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
        .user-item:hover { background: var(--accent); color: white; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #ccc; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 8px; background: var(--panel); max-width: 70%; }
        .msg.my { align-self: flex-end; background: var(--accent); color: white; margin-left: auto; }
        
        .input-box { padding: 20px; background: var(--panel); display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ddd; }
        button { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; }
        
        .settings { padding: 10px; font-size: 12px; border-top: 1px solid #eee; }
    </style>
</head>
<body data-theme="{{ me.theme }}">
    <div class="sidebar">
        <div style="padding: 20px;"><h3>Чаты</h3></div>
        <div class="user-item" onclick="setRecipient(null)"><b>🌍 Общий чат</b></div>
        <div id="user-list">
            {% for u in users %}
            <div class="user-item" onclick="setRecipient('{{ u.username }}')">
                <div class="avatar">{{ u.avatar }}</div> {{ u.username }}
            </div>
            {% endfor %}
        </div>
        
        <div class="settings">
            <form action="/update_settings" method="POST">
                Тема: <select name="theme" onchange="this.form.submit()">
                    <option value="light" {% if me.theme == 'light' %}selected{% endif %}>Светлая</option>
                    <option value="dark" {% if me.theme == 'dark' %}selected{% endif %}>Темная</option>
                </select><br><br>
                Аватар: <select name="avatar" onchange="this.form.submit()">
                    <option value="🐱" {% if me.avatar == '🐱' %}selected{% endif %}>Кот</option>
                    <option value="🐶" {% if me.avatar == '🐶' %}selected{% endif %}>Пес</option>
                    <option value="👻" {% if me.avatar == '👻' %}selected{% endif %}>Призрак</option>
                </select>
            </form>
            <p>Вы: {{ username }} <a href="/login" style="color: red;">Выход</a></p>
        </div>
    </div>

    <div class="chat-area">
        <div id="messages">
            {% for m in messages %}
            <div class="msg {% if m.sender == username %}my{% endif %}">
                <small>{{ m.sender }}</small><br>{{ m.message }}
            </div>
            {% endfor %}
        </div>
        <div class="input-box">
            <input type="text" id="m-input" placeholder="Напишите...">
            <button onclick="send()">Отправить</button>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRecipient = null;

        socket.on('connect', () => socket.emit('join', {}));

        function setRecipient(name) {
            currentRecipient = name;
            document.querySelector('h3').innerText = name ? "Чат с " + name : "Общий чат";
            document.getElementById('messages').innerHTML = ""; // Очистка для простоты при переключении
        }

        function send() {
            const inp = document.getElementById('m-input');
            if (inp.value) {
                socket.emit('send_msg', {message: inp.value, recipient: currentRecipient});
                inp.value = "";
            }
        }

        socket.on('receive_msg', (data) => {
            if (data.recipient === currentRecipient || (!data.recipient && !currentRecipient)) {
                const div = document.createElement('div');
                div.className = 'msg' + (data.sender === "{{ username }}" ? ' my' : '');
                div.innerHTML = `<small>${data.sender}</small><br>${data.message}`;
                document.getElementById('messages').appendChild(div);
                document.getElementById('messages').scrollTop = 99999;
            }
        });
    </script>
</body>
</html>
